name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, lint, unit, e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # tests/e2e/ imports the TelemetryTest AI collector fixture, which vendors
      # karkuak/qualiber (private, unpublished -- see integration/FRICTION-LOG.md). Requires a
      # QUALIBER_PAT repo secret (fine-grained PAT, Contents:Read-only on qualiber only) since the
      # default GITHUB_TOKEN can't access a different repo at all, even a private one under the
      # same account.
      - uses: actions/checkout@v4
        with:
          repository: karkuak/qualiber
          ref: efe364d6d2e03ae531619f3b0e8319e532e8c0a3
          path: .qualiber-vendor
          token: ${{ secrets.QUALIBER_PAT }}

      - name: Install qualiber deps
        working-directory: .qualiber-vendor
        run: npm ci

      # Requires a DATABASE_URL repo secret (a Neon Postgres connection
      # string) -- see docs/product/overview.md for why persistence is
      # Postgres rather than a local file.
      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  preview-deploy:
    name: Deploy PR preview
    needs: build-and-test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Requires VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID repo secrets.
      # Every PR gets its own isolated preview URL, and the Neon/Vercel
      # integration provisions a matching isolated Postgres branch per
      # preview automatically, per the "preview environments" principle in
      # the product strategy (§8).
      - name: Deploy to Vercel (preview)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::VERCEL_TOKEN is not set — skipping preview deploy. See docs/product/release-process.md."
            exit 0
          fi
          npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          npx vercel build --token="$VERCEL_TOKEN"
          url=$(npx vercel deploy --prebuilt --token="$VERCEL_TOKEN")
          echo "preview_url=$url" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        if: steps.deploy.outputs.preview_url
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Preview deployed: ${{ steps.deploy.outputs.preview_url }}`,
            });
